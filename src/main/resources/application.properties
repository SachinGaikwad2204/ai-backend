spring.application.name=ai-backend

# ========== POSTGRESQL DATABASE (Render/Neon) ==========
# Use environment variables for database connection
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# ========== CORS (Allow Vercel Frontend) ==========
# Allow specific origins for production
spring.web.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:https://ai-ui-knj79dg00-sachingaikwad2204s-projects.vercel.app,http://localhost:3000}
spring.web.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
spring.web.cors.allowed-headers=Authorization,Content-Type,Accept,X-Requested-With,Origin,Access-Control-Request-Method,Access-Control-Request-Headers
spring.web.cors.allow-credentials=true
spring.web.cors.max-age=3600

# ========== GROQ AI ==========
spring.ai.openai.base-url=https://api.groq.com/openai
spring.ai.openai.api-key=${GROQ_API_KEY}
spring.ai.openai.chat.options.model=llama-3.3-70b-versatile
spring.ai.openai.chat.options.temperature=0.7
spring.ai.openai.chat.options.max-tokens=4096

# ========== SERVER ==========
spring.mvc.async.request-timeout=60000
server.port=${PORT:8080}

# ========== CONNECTION POOL (For Render/Neon) ==========
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.connection-test-query=SELECT 1
spring.datasource.hikari.validation-timeout=5000
spring.datasource.hikari.keepalive-time=30000

# ========== LOGGING ==========
logging.level.com.sachin.ai_backend=INFO
logging.level.org.springframework.ai=INFO
logging.level.org.springframework.web=WARN